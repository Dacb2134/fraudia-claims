<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <!-- Tailwind CDN (necesario para DetalleSiniestro y páginas propias) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .risk-glow-red { box-shadow: 0 0 20px rgba(186, 26, 26, 0.2); }
    </style>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#ffdad6", "surface": "#f8f9ff", "background": "#f8f9ff",
              "on-surface": "#121c2a", "on-surface-variant": "#434652",
              "surface-container": "#e6eeff", "surface-container-high": "#dee9fc",
              "surface-container-low": "#eff4ff", "surface-container-lowest": "#ffffff",
              "surface-dim": "#d0dbed", "outline": "#747783", "outline-variant": "#c4c6d3",
              "primary": "#002662", "on-primary": "#ffffff", "primary-fixed": "#dae2ff",
              "secondary": "#0053cf", "on-secondary": "#ffffff",
              "secondary-container": "#2e6cee", "on-secondary-container": "#fefcff",
              "tertiary-container": "#004460", "on-tertiary-container": "#20b6f7",
              "tertiary-fixed": "#c6e7ff", "on-tertiary-fixed": "#001e2d",
              "on-tertiary-fixed-variant": "#004c6b", "on-tertiary": "#ffffff",
              "error": "#ba1a1a", "on-error": "#ffffff", "on-error-container": "#93000a",
              "inverse-surface": "#27313f", "inverse-on-surface": "#eaf1ff",
              "inverse-primary": "#b1c5ff", "primary-fixed-dim": "#b1c5ff",
            },
            fontFamily: {
              "body-lg": ["Inter"], "body-md": ["Inter"], "title-md": ["Inter"],
              "headline-lg": ["Hanken Grotesk"], "label-sm": ["JetBrains Mono"], "display-lg": ["Hanken Grotesk"],
            },
            fontSize: {
              "body-lg":    ["16px", { lineHeight: "26px", fontWeight: "400" }],
              "body-md":    ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "title-md":   ["18px", { lineHeight: "24px", fontWeight: "600" }],
              "headline-lg":["32px", { lineHeight: "40px", fontWeight: "600" }],
              "label-sm":   ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
              "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            },
            spacing: { "margin-desktop": "40px", "margin-mobile": "16px" },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
